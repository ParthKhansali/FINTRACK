<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>FinTrack - Dashboard</title>
    <script>
      window.API_BASE = "http://localhost:5500";
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      :root {
        --brand: #16a085;
        --brand-2: #1abc9c;
        --dark: #2c3e50;
        --muted: #607d8b;
        --radius: 10px;
        --bg: #f4f7f9;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: Inter, Arial, sans-serif;
        background: var(--bg);
        color: #222;
      }
      header.shared-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 64px;
        background: var(--dark);
        color: #fff;
        display: flex;
        align-items: center;
        padding: 10px 20px;
        gap: 18px;
        z-index: 1100;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.1);
      }
      .logo {
        font-weight: 700;
      }
      nav {
        flex: 1;
      }
      nav ul {
        display: flex;
        gap: 14px;
        list-style: none;
        align-items: center;
        margin: 0;
        padding: 0;
      }
      nav a {
        color: rgba(255, 255, 255, 0.95);
        text-decoration: none;
        padding: 8px 10px;
        border-radius: 8px;
        font-weight: 600;
      }
      nav a.active {
        background: rgba(255, 255, 255, 0.06);
        color: var(--brand-2);
      }
      .search-bar input {
        padding: 8px 12px;
        border-radius: 20px;
        border: none;
        min-width: 160px;
      }
      .actions {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-left: auto;
        position: relative;
      }
      .avatar-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        overflow: hidden;
        border: 2px solid rgba(255, 255, 255, 0.12);
        background: #fff;
        cursor: pointer;
      }
      .avatar-btn img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .user-dropdown {
        position: absolute;
        top: 64px;
        right: 0;
        background: #fff;
        color: #222;
        min-width: 200px;
        border-radius: 10px;
        box-shadow: 0 8px 26px rgba(0, 0, 0, 0.14);
        display: none;
        z-index: 1200;
        overflow: hidden;
      }
      .user-dropdown.show {
        display: block;
      }
      .user-dropdown .label {
        padding: 10px 12px;
        font-weight: 700;
        border-bottom: 1px solid #f0f2f3;
      }
      .user-dropdown button {
        width: 100%;
        padding: 10px 12px;
        border: 0;
        background: none;
        text-align: left;
        cursor: pointer;
      }
      main {
        padding: 90px 20px;
        max-width: 1200px;
        margin: 0 auto;
      }
      .summary-cards {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        margin-bottom: 24px;
      }
      .card {
        background: #fff;
        padding: 18px;
        border-radius: 10px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
        flex: 1 1 220px;
      }
      .chart-container {
        background: #fff;
        padding: 14px;
        border-radius: 10px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
        flex: 1 1 480px;
        height: 340px;
        position: relative;
        overflow: hidden;
        margin-bottom: 18px;
        display: flex;
        flex-direction: column;
      }
      .chart-container h3 {
        margin: 0 0 10px;
        font-size: 1rem;
        line-height: 1.25;
      }
      .chart-container canvas {
        width: 100% !important;
        height: 100% !important;
        flex: 1 1 auto;
        display: block;
      }
      footer {
        margin-top: 28px;
        text-align: center;
        color: var(--muted);
      }
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1400;
      }
      .modal-backdrop.show {
        display: flex;
      }
      .modal {
        background: #fff;
        border-radius: 10px;
        padding: 18px;
        width: 360px;
        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.22);
      }
      .modal input {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 8px;
        border: 1px solid #e9eef0;
      }
      .btn {
        background: var(--brand);
        color: #fff;
        border: 0;
        padding: 8px 12px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
      }
      .btn-primary {
        background: var(--brand-2);
        color: #fff;
        border: 0;
        padding: 8px 12px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <header class="shared-header">
      <div class="logo">FinTrack</div>
      <nav>
        <ul>
          <li>
            <a href="index.html" data-link="index.html" class="active"
              >Dashboard</a
            >
          </li>
          <li>
            <a href="transactions.html" data-link="transactions.html"
              >Transactions</a
            >
          </li>
          <li><a href="reports.html" data-link="reports.html">Reports</a></li>
          <li>
            <a href="settings.html" data-link="settings.html">Settings</a>
          </li>
        </ul>
      </nav>
      <div class="search-bar">
        <input id="globalSearch" placeholder="Search..." />
      </div>
      <div class="actions">
        <div class="avatar-btn" id="avatarBtn" title="Account">
          <img
            id="avatarImg"
            src="https://ui-avatars.com/api/?name=U&background=16a085&color=fff&rounded=true&size=128"
            alt="avatar"
          />
        </div>
        <div class="user-dropdown" id="userDropdown" aria-hidden="true">
          <div class="label" id="userLabel">Not signed in</div>
          <button id="ddLoginBtn">Login</button>
          <button id="ddDemoBtn">Demo Login</button>
          <button id="ddProfileBtn" style="display: none">Profile</button>
          <button id="ddLogoutBtn" style="display: none">Logout</button>
        </div>
      </div>
    </header>

    <main>
      <h1>Dashboard</h1>
      <section class="summary-cards">
        <div class="card">
          <strong>Total Balance</strong>
          <div id="totalBalance">$12,450</div>
        </div>
        <div class="card">
          <strong>Monthly Income</strong>
          <div id="monthlyIncome">$5,200</div>
        </div>
        <div class="card">
          <strong>Monthly Expenses</strong>
          <div id="monthlyExpenses">$3,450</div>
        </div>
        <div class="card">
          <strong>Remaining Budget</strong>
          <div id="remainingBudget">$1,750</div>
        </div>
      </section>

      <section class="charts" style="display: flex; gap: 20px; flex-wrap: wrap">
        <div class="chart-container">
          <h3>Expenses by Category</h3>
          <canvas id="expensesChart"></canvas>
        </div>
        <div class="chart-container">
          <h3>Income vs Expenses</h3>
          <canvas id="incomeExpenseChart"></canvas>
        </div>
      </section>
    </main>

    <footer>&copy; 2025 FinTrack</footer>

    <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true">
        <h3 style="margin: 0 0 10px">Login to FinTrack</h3>
        <input id="loginEmail" type="email" placeholder="Email" />
        <input id="loginPassword" type="password" placeholder="Password" />
        <div
          style="
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 6px;
          "
        >
          <button class="btn-primary" id="loginBtn">Login</button>
          <button class="btn" id="closeModalBtn" style="background: #9aa4a8">
            Cancel
          </button>
        </div>
      </div>
    </div>

    <!-- scripts -->
    <script src="api.js"></script>
    <script>
      // auth & header behavior (shared)
      (function () {
        const avatarBtn = document.getElementById("avatarBtn");
        const userDropdown = document.getElementById("userDropdown");
        const userLabel = document.getElementById("userLabel");
        const ddLoginBtn = document.getElementById("ddLoginBtn");
        const ddDemoBtn = document.getElementById("ddDemoBtn");
        const ddProfileBtn = document.getElementById("ddProfileBtn");
        const ddLogoutBtn = document.getElementById("ddLogoutBtn");
        const modal = document.getElementById("modalBackdrop");
        const loginBtn = document.getElementById("loginBtn");
        const closeModalBtn = document.getElementById("closeModalBtn");

        function showDropdown() {
          userDropdown.classList.add("show");
          userDropdown.setAttribute("aria-hidden", "false");
        }
        function hideDropdown() {
          userDropdown.classList.remove("show");
          userDropdown.setAttribute("aria-hidden", "true");
        }
        function openModal() {
          modal.classList.add("show");
          modal.style.display = "flex";
          modal.setAttribute("aria-hidden", "false");
          document.getElementById("loginEmail").focus();
        }
        function closeModal() {
          modal.classList.remove("show");
          modal.style.display = "none";
          modal.setAttribute("aria-hidden", "true");
        }

        function setSignedInUI(email) {
          sessionStorage.setItem("ft_email", email);
          userLabel.textContent = email;
          ddLoginBtn.style.display = "none";
          ddDemoBtn.style.display = "none";
          ddProfileBtn.style.display = "block";
          ddLogoutBtn.style.display = "block";
          document.getElementById(
            "avatarImg"
          ).src = `https://ui-avatars.com/api/?name=${encodeURIComponent(
            email.split("@")[0]
          )}&background=16a085&color=fff&rounded=true&size=128`;
        }
        function setSignedOutUI() {
          sessionStorage.removeItem("ft_email");
          userLabel.textContent = "Not signed in";
          ddLoginBtn.style.display = "block";
          ddDemoBtn.style.display = "block";
          ddProfileBtn.style.display = "none";
          ddLogoutBtn.style.display = "none";
          document.getElementById(
            "avatarImg"
          ).src = `https://ui-avatars.com/api/?name=U&background=16a085&color=fff&rounded=true&size=128`;
        }

        (function initAuthFromSession() {
          const email = sessionStorage.getItem("ft_email");
          if (email) setSignedInUI(email);
          else setSignedOutUI();
        })();

        avatarBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          userDropdown.classList.toggle("show");
        });
        document.addEventListener("click", (e) => {
          if (!userDropdown.contains(e.target) && !avatarBtn.contains(e.target))
            userDropdown.classList.remove("show");
        });

        ddLoginBtn.addEventListener("click", () => {
          hideDropdown();
          openModal();
        });
        ddDemoBtn.addEventListener("click", () => {
          setSignedInUI("demo@fintrack");
          hideDropdown();
        });
        ddProfileBtn.addEventListener(
          "click",
          () => (location.href = "settings.html")
        );
        ddLogoutBtn.addEventListener("click", () => {
          setSignedOutUI();
          hideDropdown();
        });

        closeModalBtn.addEventListener("click", closeModal);
        modal.addEventListener("click", (e) => {
          if (e.target === modal) closeModal();
        });

        loginBtn.addEventListener("click", async () => {
          const email = (
            document.getElementById("loginEmail").value || ""
          ).trim();
          const pwd = document.getElementById("loginPassword").value || "";
          if (!email || !pwd) {
            alert("Enter email and password (demo accepts any).");
            return;
          }
          try {
            // call backend login if you want: await ft.apiPost('/api/login', { email, password: pwd })
            setSignedInUI(email);
            closeModal();
          } catch (err) {
            alert("Login failed");
            console.error(err);
          }
        });
      })();

      // charts + data load
      document.addEventListener("DOMContentLoaded", async () => {
        ft.initEmptyCharts();
        await ft.loadDashboard(1);
      });
    </script>
  </body>
</html>
